<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HermesSwift hero</title>
  <desc id="desc">A refined black and phosphor-green abstract hero for HermesSwift, a native SwiftUI iOS client for Hermes Agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020503"/>
      <stop offset="0.5" stop-color="#000000"/>
      <stop offset="1" stop-color="#031006"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#40ff73" stop-opacity="0.24"/>
      <stop offset="55%" stop-color="#40ff73" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#40ff73" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102018" stop-opacity="0.78"/>
      <stop offset="0.45" stop-color="#050905" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#40ff73" stop-opacity="0.88"/>
      <stop offset="0.48" stop-color="#40ff73" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#40ff73" stop-opacity="0.56"/>
    </linearGradient>
    <filter id="blurGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#40ff73" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.85"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#40ff73" stroke-opacity="0.055"/>
    </pattern>
    <style>
      .mono { font-family: SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="930" cy="310" r="360" fill="url(#glowA)"/>
  <circle cx="1070" cy="560" r="180" fill="#40ff73" opacity="0.05" filter="url(#blurGlow)"/>

  <g transform="translate(86 88)">
    <text class="mono" x="0" y="28" fill="#40ff73" font-size="16" letter-spacing="3">HERMES AGENT · NATIVE iOS CLIENT</text>
    <text class="sans" x="0" y="112" fill="#F0FFF4" font-size="76" font-weight="820">HermesSwift</text>
    <text class="mono" x="2" y="160" fill="#40ff73" font-size="25">SwiftUI command console for self-hosted agents</text>

    <g transform="translate(0 218)">
      <rect x="0" y="0" width="600" height="116" rx="24" fill="#07100a" fill-opacity="0.82" stroke="#40ff73" stroke-opacity="0.18"/>
      <text class="mono" x="28" y="38" fill="#40ff73" font-size="17">$ hermes mobile connect</text>
      <text class="mono" x="28" y="72" fill="#B9FFD0" font-size="17">sessions · voice · files · actions</text>
      <text class="mono" x="28" y="98" fill="#68D98B" font-size="14">token: stored in Keychain / backend: yours</text>
    </g>

    <g transform="translate(0 378)">
      <rect x="0" y="0" width="152" height="42" rx="21" fill="#40ff73" fill-opacity="0.15" stroke="#40ff73" stroke-opacity="0.42"/>
      <text class="mono" x="24" y="27" fill="#DFFFF0" font-size="14">SwiftUI</text>
      <rect x="170" y="0" width="162" height="42" rx="21" fill="#40ff73" fill-opacity="0.10" stroke="#40ff73" stroke-opacity="0.32"/>
      <text class="mono" x="194" y="27" fill="#DFFFF0" font-size="14">Keychain</text>
      <rect x="350" y="0" width="178" height="42" rx="21" fill="#40ff73" fill-opacity="0.10" stroke="#40ff73" stroke-opacity="0.32"/>
      <text class="mono" x="374" y="27" fill="#DFFFF0" font-size="14">Attachments</text>
    </g>
  </g>

  <!-- Refined abstract device / command surface -->
  <g transform="translate(754 78) rotate(-3 210 250)" filter="url(#panelShadow)">
    <rect x="0" y="0" width="380" height="500" rx="46" fill="#010301" stroke="url(#edge)" stroke-width="2.5"/>
    <rect x="18" y="18" width="344" height="464" rx="34" fill="url(#glass)" stroke="#40ff73" stroke-opacity="0.16"/>
    <rect x="140" y="36" width="100" height="8" rx="4" fill="#40ff73" fill-opacity="0.18"/>

    <g transform="translate(42 72)">
      <text class="mono" x="0" y="0" fill="#40ff73" font-size="13" letter-spacing="1.4">ACTIVE SESSION</text>
      <text class="sans" x="0" y="36" fill="#EFFFF4" font-size="25" font-weight="720">Agent Console</text>
      <line x1="0" y1="58" x2="292" y2="58" stroke="#40ff73" stroke-opacity="0.18"/>
    </g>

    <g transform="translate(42 158)">
      <rect x="0" y="0" width="254" height="56" rx="18" fill="#000000" stroke="#40ff73" stroke-opacity="0.22"/>
      <text class="mono" x="18" y="23" fill="#40ff73" font-size="12">assistant</text>
      <text class="mono" x="18" y="43" fill="#B8FFD0" font-size="12">Ready. What should I handle?</text>
    </g>

    <g transform="translate(86 232)">
      <rect x="0" y="0" width="228" height="54" rx="18" fill="#40ff73" fill-opacity="0.14" stroke="#40ff73" stroke-opacity="0.24"/>
      <text class="mono" x="18" y="33" fill="#F1FFF5" font-size="12">Summarize latest thread</text>
    </g>

    <g transform="translate(42 316)">
      <rect x="0" y="0" width="292" height="64" rx="20" fill="#40ff73" fill-opacity="0.055" stroke="#40ff73" stroke-opacity="0.18"/>
      <text class="mono" x="18" y="25" fill="#40ff73" font-size="12">command palette</text>
      <text class="mono" x="18" y="47" fill="#B8FFD0" font-size="12">debug · extract tasks · analyze image</text>
    </g>

    <g transform="translate(42 416)">
      <rect x="0" y="0" width="220" height="38" rx="19" fill="#020603" stroke="#40ff73" stroke-opacity="0.18"/>
      <text class="mono" x="18" y="25" fill="#62E88E" font-size="12">Message HermesSwift…</text>
      <circle cx="270" cy="19" r="18" fill="#40ff73" fill-opacity="0.18" stroke="#40ff73" stroke-opacity="0.34"/>
      <path d="M267 11L276 19L267 27" stroke="#40ff73" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Background floating panels, less literal than a phone mockup -->
  <g opacity="0.76">
    <rect x="1006" y="94" width="164" height="54" rx="16" fill="#40ff73" fill-opacity="0.07" stroke="#40ff73" stroke-opacity="0.20"/>
    <text class="mono" x="1024" y="127" fill="#81F5A3" font-size="13">voice ready</text>
    <rect x="690" y="506" width="214" height="58" rx="18" fill="#40ff73" fill-opacity="0.06" stroke="#40ff73" stroke-opacity="0.18"/>
    <text class="mono" x="712" y="540" fill="#81F5A3" font-size="13">attachments: synced</text>
  </g>
</svg>
