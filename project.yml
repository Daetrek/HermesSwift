name: HermesSwift
options:
  bundleIdPrefix: dev.hermesagent
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  HermesSwift:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HermesSwift
    resources:
      - path: HermesSwift/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.hermesagent.HermesSwift
        INFOPLIST_FILE: HermesSwift/Support/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 6.0
