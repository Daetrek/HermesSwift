<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HermesSwift terminal hero</title>
  <desc id="desc">A clean black and phosphor-green terminal banner for HermesSwift, a native SwiftUI iOS client for Hermes Agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020503"/>
      <stop offset="0.54" stop-color="#000000"/>
      <stop offset="1" stop-color="#021208"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#40ff73" stop-opacity="0.28"/>
      <stop offset="0.58" stop-color="#40ff73" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#40ff73" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.88"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#40ff73" flood-opacity="0.10"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#40ff73" stroke-opacity="0.045"/>
    </pattern>
    <style>
      .mono { font-family: SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="970" cy="250" r="330" fill="url(#glow)"/>
  <circle cx="210" cy="560" r="220" fill="#40ff73" opacity="0.04" filter="url(#soft)"/>

  <g transform="translate(92 82)">
    <text class="mono" x="0" y="0" fill="#40ff73" font-size="16" letter-spacing="3">HERMES AGENT · NATIVE iOS CLIENT</text>
    <text class="sans" x="0" y="92" fill="#F2FFF6" font-size="76" font-weight="820">HermesSwift</text>
    <text class="mono" x="2" y="142" fill="#40ff73" font-size="26">SwiftUI command console for self-hosted agents</text>
  </g>

  <g transform="translate(92 280)" filter="url(#shadow)">
    <rect x="0" y="0" width="1096" height="228" rx="28" fill="#030704" stroke="#40ff73" stroke-opacity="0.22"/>
    <rect x="0.5" y="0.5" width="1095" height="227" rx="27.5" stroke="#40ff73" stroke-opacity="0.10"/>

    <g transform="translate(28 26)">
      <circle cx="8" cy="8" r="6" fill="#40ff73" fill-opacity="0.72"/>
      <circle cx="30" cy="8" r="6" fill="#40ff73" fill-opacity="0.38"/>
      <circle cx="52" cy="8" r="6" fill="#40ff73" fill-opacity="0.20"/>
    </g>

    <text class="mono" x="30" y="74" fill="#40ff73" font-size="18">$ hermes-swift connect --backend yours</text>
    <text class="mono" x="30" y="112" fill="#DFFFF0" font-size="19">sessions · streaming chat · voice · files · command palette</text>
    <text class="mono" x="30" y="150" fill="#8CFFAE" font-size="16">api token: Keychain     defaults: public-safe     UI: black/phosphor-green</text>

    <g transform="translate(30 174)">
      <rect x="0" y="0" width="138" height="34" rx="17" fill="#40ff73" fill-opacity="0.13" stroke="#40ff73" stroke-opacity="0.36"/>
      <text class="mono" x="22" y="23" fill="#DFFFF0" font-size="13">SwiftUI</text>
      <rect x="156" y="0" width="150" height="34" rx="17" fill="#40ff73" fill-opacity="0.10" stroke="#40ff73" stroke-opacity="0.28"/>
      <text class="mono" x="178" y="23" fill="#DFFFF0" font-size="13">Keychain</text>
      <rect x="324" y="0" width="158" height="34" rx="17" fill="#40ff73" fill-opacity="0.10" stroke="#40ff73" stroke-opacity="0.28"/>
      <text class="mono" x="346" y="23" fill="#DFFFF0" font-size="13">Voice API</text>
      <rect x="500" y="0" width="178" height="34" rx="17" fill="#40ff73" fill-opacity="0.10" stroke="#40ff73" stroke-opacity="0.28"/>
      <text class="mono" x="522" y="23" fill="#DFFFF0" font-size="13">Attachments</text>
    </g>

    <g transform="translate(750 40)">
      <rect x="0" y="0" width="300" height="136" rx="22" fill="#40ff73" fill-opacity="0.055" stroke="#40ff73" stroke-opacity="0.18"/>
      <text class="mono" x="22" y="34" fill="#40ff73" font-size="14">COMMANDS</text>
      <text class="mono" x="22" y="66" fill="#DFFFF0" font-size="14">summarize chat</text>
      <text class="mono" x="22" y="92" fill="#B8FFD0" font-size="14">extract tasks</text>
      <text class="mono" x="22" y="118" fill="#8CFFAE" font-size="14">analyze screenshot</text>
    </g>
  </g>

  <g opacity="0.55">
    <line x1="92" y1="552" x2="1188" y2="552" stroke="#40ff73" stroke-opacity="0.18"/>
    <text class="mono" x="92" y="590" fill="#69E98F" font-size="14">github.com/Daetrek/HermesSwift</text>
    <text class="mono" x="966" y="590" fill="#69E98F" font-size="14">MIT · iOS 17+</text>
  </g>
</svg>
